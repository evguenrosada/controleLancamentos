server:
  port: 8082

spring:
  application:
    name: saldos-api
  datasource:
    url: jdbc:postgresql://localhost:5432/pontuacao_servicos?currentSchema=saldos
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: saldos
    open-in-view: false
  flyway:
    enabled: true
    schemas: saldos
    default-schema: saldos
    create-schemas: true
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: controle-lancamentos-jwt-secret-change-in-production-min-32-chars
    expiration-minutes: 60
  redis:
    lancamento-events-queue: lancamentos:events
